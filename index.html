<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | The Velvet Lounge Smart Portal</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* PREMIUM DARK-GOLD DESIGN SYSTEM */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #05070f;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container-box {
            width: 100%;
            max-width: 26rem;
            background-color: #0b0f19;
            border: 1px solid #1e2640;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        /* BRAND IDENTITY */
        .brand-logo {
            width: 4.5rem;
            height: 4.5rem;
            background-color: #141b2d;
            border: 2px solid #c5a880;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: #c5a880;
            font-size: 1.75rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        /* HARDWARE FORM SYSTEM */
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #c5a880;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: #475569;
            font-size: 1rem;
        }
        .form-control {
            width: 100%;
            background-color: #05070f;
            border: 1px solid #1e2640;
            border-radius: 0.75rem;
            padding: 1rem 1rem 1rem 2.75rem;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #c5a880;
        }

        /* INTERACTIVE CTA BUTTON */
        .btn-proceed {
            width: 100%;
            background-color: #c5a880;
            color: #05070f;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-proceed:hover {
            background-color: #b3956b;
            transform: translateY(-1px);
        }
        .btn-proceed:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container-box">
        <!-- Logo Display -->
        <div class="brand-logo">
            <i class="fa-solid fa-mug-hot"></i>
        </div>
        
        <h1>The Velvet Lounge</h1>
        <p>डिजिटल मेनू प्रविष्टि गेटवे। जारी रखने के लिए कृपया अपनी पहचान और टेबल सत्यापित करें।</p>

        <!-- Session Input Form -->
        <form id="checkin-form" onsubmit="handleCheckIn(event)">
            
            <!-- Customer Name Input -->
            <div class="form-group">
                <label for="cust_name">Customer Name / आपका नाम</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="cust_name" class="form-control" placeholder="e.g. Satyam Sharma" required autocomplete="off">
                </div>
            </div>

            <!-- Table Number Input -->
            <div class="form-group">
                <label for="table_no">Table Number / टेबल संख्या</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-chair"></i>
                    <input type="number" id="table_no" class="form-control" placeholder="e.g. 4" min="1" max="50" required>
                </div>
            </div>

            <!-- Submission Trigger -->
            <button type="submit" class="btn-proceed">
                Explore Digital Menu <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <!-- PERSISTENT STATE LOGIC -->
    <script>
        // सुनिश्चित करें कि नया सेशन शुरू होने पर पुराना कचरा साफ़ हो जाए
        window.onload = function() {
            localStorage.clear();
        };

        function handleCheckIn(event) {
            event.preventDefault(); // फॉर्म रीलोड रोकें

            const nameInput = document.getElementById('cust_name').value.trim();
            const tableInput = document.getElementById('table_no').value.trim();

            if (!nameInput || !tableInput) {
                alert("कृपया सभी फ़ील्ड सही ढंग से भरें।");
                return;
            }

            // डाटा पैकेट को स्थानीय ब्राउज़र स्टोरेज में मैप करें
            localStorage.setItem('digiconvo_cust_name', nameInput);
            localStorage.setItem('digiconvo_table_no', tableInput);

            // ग्राहक को अगले मुख्य मेनू पृष्ठ पर रीडायरेक्ट करें
            window.location.href = "menu.html";
        }
    </script>
</body>
</html>
