<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Basket | Secure Order Terminal</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* SYSTEM SKIN & COLOR CONSISTENCY */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #05070f;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 1.5rem 1rem;
        }
        .max-w-md {
            max-width: 28rem;
            margin: 0 auto;
            background-color: #0b0f19;
            border: 1px solid #1e2640;
            border-radius: 1.5rem;
            padding: 1.75rem 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* INVOICE CARD ELEMENTS */
        h1 { font-size: 1.35rem; font-weight: 800; color: #ffffff; margin-bottom: 0.25rem; }
        .meta-subtitle { font-size: 0.8rem; color: #94a3b8; margin-bottom: 1.5rem; }
        
        .client-pill-box {
            background-color: #141b2d;
            border: 1px solid #242f4d;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .client-pill-box strong { color: #c5a880; }

        /* ITEMIZATION LAYOUT GRID */
        .basket-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 0;
            border-bottom: 1px dashed #1e2640;
            font-size: 0.95rem;
        }
        .item-qty-name { display: flex; gap: 0.75rem; align-items: center; }
        .qty-badge {
            background-color: rgba(197, 168, 128, 0.15);
            border: 1px solid #c5a880;
            color: #c5a880;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
        }
        .item-final-cost { font-weight: 700; color: #ffffff; }

        .total-summary-card {
            background-color: #141b2d;
            border-radius: 0.75rem;
            padding: 1.25rem 1rem;
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e2640;
        }
        .total-summary-card span { font-size: 0.9rem; color: #cbd5e1; font-weight: 600; }
        .total-summary-card strong { font-size: 1.4rem; color: #c5a880; font-weight: 900; }

        /* THERMAL LOG VISUAL PREVIEW BOX */
        .kot-label {
            font-size: 0.75rem;
            color: #c5a880;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1.75rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .kot-print-container {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            padding: 1.25rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            white-space: pre-wrap;
            line-height: 1.4;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 1.75rem;
        }

        /* GATEWAY ROUTING MODAL OPTIONS */
        .route-label { font-size: 0.8rem; color: #cbd5e1; font-weight: 700; margin-bottom: 0.5rem; display: block;}
        .payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .pay-option-card {
            background-color: #141b2d;
            border: 1px solid #242f4d;
            border-radius: 0.75rem;
            padding: 1rem 0.75rem;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .pay-option-card input { position: absolute; top: 0.5rem; right: 0.5rem; cursor: pointer; }
        .pay-option-card i { font-size: 1.25rem; margin-bottom: 0.35rem; display: block; }
        
        .pay-option-card.active-whatsapp { border-color: #10b981; color: #10b981; background-color: rgba(16, 185, 129, 0.05); }
        .pay-option-card.active-upi { border-color: #3b82f6; color: #3b82f6; background-color: rgba(59, 130, 246, 0.05); }

        .btn-dispatch {
            width: 100%;
            background-color: #10b981;
            color: #05070f;
            border: none;
            padding: 1.1rem;
            border-radius: 0.75rem;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="max-w-md">
        
        <h1>Review Selected Order</h1>
        <p class="meta-subtitle">Verify your dishes and select your processing gateway channel.</p>

        <!-- Dynamic Session Target Card -->
        <div class="client-pill-box">
            <div><i class="fa-solid fa-user"></i> Guest: <strong id="inv-name">...</strong></div>
            <div><i class="fa-solid fa-chair"></i> Allocation: <strong id="inv-table">T-00</strong></div>
        </div>

        <!-- Dynamic Injection Hook -->
        <div id="basket-items-summary"></div>

        <!-- Gross Value Target -->
        <div class="total-summary-card">
            <span>Aggregated Gross Total</span>
            <strong id="inv-grand-total">₹0</strong>
        </div>

        <!-- MONOSPACE KOT PREVIEW WINDOW -->
        <div class="kot-label"><i class="fa-solid fa-print"></i> Live Thermal KOT Copy Output</div>
        <div class="kot-print-container" id="kot-receipt-block"></div>

        <!-- INTERACTIVE MODE SELECTORS -->
        <label class="route-label">Choose Settlement Mode</label>
        <div class="payment-grid">
            
            <div class="pay-option-card active-whatsapp" id="card-wa" onclick="togglePaymentMode('whatsapp')">
                <input type="radio" name="settle_group" value="whatsapp" checked id="radio-wa">
                <i class="fa-brands fa-whatsapp"></i>
                <span style="font-size:0.8rem; font-weight:700;">WhatsApp COD</span>
            </div>
            
            <div class="pay-option-card" id="card-upi" onclick="togglePaymentMode('upi')">
                <input type="radio" name="settle_group" value="upi" id="radio-upi">
                <i class="fa-solid fa-credit-card"></i>
                <span style="font-size:0.8rem; font-weight:700;">Instant UPI Link</span>
            </div>

        </div>

        <!-- PIPELINE DISPATCH BUTTON -->
        <button class="btn-dispatch" onclick="processOrderPipeline()">
            Dispatch Order Payload <i class="fa-solid fa-paper-plane"></i>
        </button>

    </div>

    <script>
        const DESTINATION_PHONE = "917470969466";
        const CLOUD_API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxIeelWP-KGmVllSB9AM-BY49Gb4bPgRL8Zz7fekT8sTgKrbcwYC38TgvIPjrd_yT1b/exec";
        
        let sessionCart = {};
        let grandTotalValue = 0;
        let guestName = "";
        let tableAllocation = "";

        window.onload = function() {
            guestName = localStorage.getItem('digiconvo_cust_name');
            tableAllocation = localStorage.getItem('digiconvo_table_no');
            const cachedCart = localStorage.getItem('digiconvo_cart');

            if (!guestName || !tableAllocation || !cachedCart) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById('inv-name').innerText = guestName;
            document.getElementById('inv-table').innerText = `Table ${tableAllocation}`;
            
            try {
                sessionCart = JSON.parse(cachedCart);
                compileOrderInvoiceAndKOT();
            } catch (e) {
                console.error("Malformed cache map parsing error:", e);
                window.location.href = "menu.html";
            }
        };

        function compileOrderInvoiceAndKOT() {
            const summaryContainer = document.getElementById('basket-items-summary');
            summaryContainer.innerHTML = "";
            grandTotalValue = 0;

            // Enforces structural width limits at exactly 26 characters wide
            let kotHeader = `    THE VELVET LOUNGE     \n`;
            kotHeader += `==========================\n`;
            kotHeader += `KOT REF: #KOT-${Math.floor(Math.random() * 9000 + 1000)}\n`;
            kotHeader += `TBL: ${tableAllocation.toUpperCase().padEnd(4)} | GUEST: ${guestName.toUpperCase().substring(0, 10)}\n`;
            kotHeader += `==========================\n`;
            let kotRows = "";

            for (let dish in sessionCart) {
                let cost = sessionCart[dish].price * sessionCart[dish].qty;
                grandTotalValue += cost;

                const row = document.createElement('div');
                row.className = "basket-item-row";
                row.innerHTML = `
                    <div class="item-qty-name">
                        <span class="qty-badge">${sessionCart[dish].qty}x</span>
                        <span>${dish}</span>
                    </div>
                    <div class="item-final-cost">₹${cost}</div>
                `;
                summaryContainer.appendChild(row);

                let itemString = `${sessionCart[dish].qty}x ${dish}`;
                let priceString = `₹${cost}`;
                
                if (itemString.length > 20) {
                    itemString = itemString.substring(0, 17) + "...";
                }
                
                let spaceCount = 26 - (itemString.length + priceString.length);
                if (spaceCount < 1) spaceCount = 1;
                kotRows += `${itemString}${" ".repeat(spaceCount)}${priceString}\n`;
            }

            let kotFooter = `==========================\n`;
            let totalLabel = `GRAND TOTAL:`;
            let totalValStr = `₹${grandTotalValue}`;
            let totalSpace = 26 - (totalLabel.length + totalValStr.length);
            if (totalSpace < 1) totalSpace = 1;
            
            kotFooter += `${totalLabel}${" ".repeat(totalSpace)}${totalValStr}\n`;
            kotFooter += `--------------------------\n`;
            kotFooter += `   Powered by Digiconvo   \n`;

            document.getElementById('inv-grand-total').innerText = `₹${grandTotalValue}`;
            document.getElementById('kot-receipt-block').innerText = kotHeader + kotRows + kotFooter;
        }

        function togglePaymentMode(mode) {
            const waCard = document.getElementById('card-wa');
            const upiCard = document.getElementById('card-upi');
            const waRadio = document.getElementById('radio-wa');
            const upiRadio = document.getElementById('radio-upi');

            if (mode === 'whatsapp') {
                waCard.className = "pay-option-card active-whatsapp";
                upiCard.className = "pay-option-card";
                waRadio.checked = true;
            } else {
                upiCard.className = "pay-option-card active-upi";
                waCard.className = "pay-option-card";
                upiRadio.checked = true;
            }
        }

        function processOrderPipeline() {
            const checkedInput = document.querySelector('input[name="settle_group"]:checked');
            if (!checkedInput) {
                alert("Please pick a settlement method gateway.");
                return;
            }
            
            const selectedMode = checkedInput.value;
            const printableKotBlock = document.getElementById('kot-receipt-block').innerText;
            
            let orderPayload = {
                id: `REF-${Math.floor(Math.random() * 9000 + 1000)}`,
                guest: guestName,
                table: tableAllocation,
                mode: selectedMode.toUpperCase(),
                total: grandTotalValue,
                rawKot: printableKotBlock
            };

            // 🚀 FIRE BACKGROUND ASYNCHRONOUS PUSH TO LIVE CLUTCH GOOGLE SHEET API SERVER 
            fetch(CLOUD_API_ENDPOINT, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderPayload)
            }).catch(err => console.error("Cloud tracking fallback activated:", err));

            // COMPILING WHATSAPP CORE MESSAGING STRINGS
            let textMsg = `*🔥 NEW ORDER RECEIVED * \n\n`;
            textMsg += `*👤 Guest Name:* ${guestName}\n`;
            textMsg += `*📍 Table Number:* ${tableAllocation}\n`;
            textMsg += `*💳 Settlement:* ${selectedMode.toUpperCase()}\n`;
            textMsg += `--------------------------------------\n\n`;
            textMsg += `*🖨️ READY-TO-PRINT KOT COPY:* \n`;
            textMsg += `\`\`\`\n${printableKotBlock}\`\`\`\n\n`;

            if (selectedMode === 'upi') {
                let upiIntentString = `upi://pay?pa=7470969466@ybl&pn=The%20Velvet%20Lounge&am=${grandTotalValue}&cu=INR&tn=Table${tableAllocation}`;
                textMsg += `*⚡ Customer UPI Payment Intent Link:* \n${upiIntentString}`;
            }

            const dispatchUrl = `https://api.whatsapp.com/send?phone=${DESTINATION_PHONE}&text=${encodeURIComponent(textMsg)}`;
            
            // Native anchor isolation bypass loop eliminates compiler sandbox constraints
            const nativeAnchor = document.createElement('a');
            nativeAnchor.href = dispatchUrl;
            nativeAnchor.target = '_blank';
            nativeAnchor.rel = 'noopener noreferrer';
            
            document.body.appendChild(nativeAnchor);
            nativeAnchor.click();
            document.body.removeChild(nativeAnchor);

            // Defensive safety delay prevents OS background navigation app execution crashes
            setTimeout(() => {
                window.location.href = "success.html";
            }, 500);
        }
    </script>
</body>
</html>
