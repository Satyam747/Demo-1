<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | The Velvet Lounge Live Portal</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* LUXURY DARK & GOLD CORE DESIGN SYSTEM */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #05070f;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 7rem;
        }
        .max-w-md {
            max-width: 28rem;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #0b0f19;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* LIVE METADATA SESSION HEADER */
        .session-header {
            background-color: #141b2d;
            border-bottom: 1px solid #1e2640;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-meta h2 {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 800;
        }
        .user-meta p {
            font-size: 0.8rem;
            color: #10b981;
            font-weight: 600;
        }
        .table-indicator {
            background-color: rgba(197, 168, 128, 0.15);
            border: 1px solid #c5a880;
            color: #c5a880;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 0.35rem 0.75rem;
            border-radius: 0.5rem;
        }

        /* LOADING INTERFACES */
        .loading-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem;
            color: #94a3b8;
            text-align: center;
        }
        .spinner {
            border: 3px solid rgba(197, 168, 128, 0.1);
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border-left-color: #c5a880;
            animation: spin 1s linear infinite;
            margin-bottom: 1.25rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* DYNAMIC CATEGORY FILTER PILLS */
        .categories-wrapper {
            display: flex;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem 0.5rem 1.5rem;
            overflow-x: auto;
            white-space: nowrap;
        }
        .categories-wrapper::-webkit-scrollbar { display: none; }
        .cat-pill {
            background-color: #141b2d;
            border: 1px solid #242f4d;
            color: #cbd5e1;
            padding: 0.6rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .cat-pill.active {
            background-color: #c5a880;
            color: #070a13;
            border-color: #c5a880;
        }

        /* DYNAMIC PRODUCT CARDS */
        .menu-container { padding: 1.25rem 1.5rem; }
        .menu-card {
            background-color: #141b2d;
            border: 1px solid #1e2640;
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            position: relative;
        }
        .prod-img {
            width: 5.5rem;
            height: 5.5rem;
            border-radius: 0.75rem;
            object-fit: cover;
            background-color: #05070f;
        }
        .prod-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .prod-title { font-size: 1rem; font-weight: 700; color: #ffffff; display: flex; align-items: center; gap: 0.5rem; }
        .prod-desc { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; line-height: 1.3; }
        .prod-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
        
        /* ⚡ HAPPY HOUR VISUAL DESIGN SYSTEM */
        .prod-price { font-size: 1.1rem; font-weight: 800; color: #c5a880; display: flex; align-items: center; gap: 0.4rem; }
        .old-price { font-size: 0.85rem; font-weight: 500; color: #64748b; text-decoration: line-through; }
        .happy-hour-badge {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            margin-top: 0.25rem;
        }
        
        /* ADD BUTTON SYSTEM */
        .add-item-btn {
            background-color: transparent;
            border: 1px solid #c5a880;
            color: #c5a880;
            padding: 0.4rem 1.2rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-item-btn:hover { background-color: #c5a880; color: #070a13; }

        /* STEPPER COMPONENT */
        .stepper-container {
            display: flex;
            align-items: center;
            background-color: #c5a880;
            border-radius: 0.5rem;
            padding: 0.15rem 0.3rem;
            gap: 0.75rem;
        }
        .step-btn {
            background: none;
            border: none;
            color: #05070f;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            padding: 0.1rem 0.4rem;
        }
        .step-qty {
            color: #05070f;
            font-weight: 800;
            font-size: 0.9rem;
            min-width: 1rem;
            text-align: center;
        }

        /* FLOATING ACTION STRIP */
        .cart-strip {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 3rem);
            max-width: 25rem;
            background-color: #10b981;
            color: #070a13;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 100;
            font-weight: 800;
            text-decoration: none;
            display: none;
        }
    </style>
</head>
<body>

    <div class="max-w-md">
        
        <!-- TOP AUTHENTICATION SESSION HEADER -->
        <header class="session-header">
            <div class="user-meta">
                <h2 id="display-name">Verifying User...</h2>
                <p><i class="fa-solid fa-circle"></i> High Performance Stream Active</p>
            </div>
            <div class="table-indicator" id="display-table">T-00</div>
        </header>

        <!-- DYNAMIC FILTER BAR -->
        <nav class="categories-wrapper" id="categories-bar">
            <!-- Automatically Injected via Visualization API -->
        </nav>

        <!-- LIVE STREAM DATA FEED LOADING UI -->
        <div id="loading-view" class="loading-box">
            <div class="spinner"></div>
            <p style="font-weight: 600;">Streaming Menu Rows Securely...</p>
            <p style="font-size: 0.75rem; color: #64748b; margin-top: 0.25rem;">Direct Google Server Hook</p>
        </div>

        <!-- MAIN PRODUCTS LAYOUT -->
        <main class="menu-container" id="menu-items-grid" style="display: none;">
            <!-- Automatically Injected via Visualization API -->
        </main>

        <!-- FLOATING ACTION STRIP FOR BASKET TRANSFER -->
        <a href="checkout.html" id="floating-cart-bar" class="cart-strip">
            <div>
                <span id="strip-count" style="display:block; font-size:0.75rem; opacity:0.8; text-transform:uppercase;">0 Items Selected</span>
                <span id="strip-total" style="font-size:1.15rem;">Total: ₹0</span>
            </div>
            <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.95rem;">
                View Basket <i class="fa-solid fa-basket-shopping"></i>
            </div>
        </a>

    </div>

    <!-- ANONYMOUS SPREADSHEET DISPATCH ARCHITECTURE -->
    <script>
        const SPREADSHEET_ID = "11GI3zgBG6Zgjy45v2SIeu6QF7c8xIyNoQvtI92P58ME";
        
        let globalMenuData = [];
        let activeCategory = "";
        let cartState = {};

        window.onload = function() {
            const storedName = localStorage.getItem('digiconvo_cust_name');
            const storedTable = localStorage.getItem('digiconvo_table_no');

            if (!storedName || !storedTable) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById('display-name').innerText = `Hello, ${storedName}`;
            document.getElementById('display-table').innerText = `Table ${storedTable}`;

            const savedCart = localStorage.getItem('digiconvo_cart');
            if (savedCart) {
                cartState = JSON.parse(savedCart);
            }

            fetchLiveGoogleSheetData();
        };

        async function fetchLiveGoogleSheetData() {
            const endpoint = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
            
            try {
                const response = await fetch(endpoint);
                const text = await response.text();
                
                const startPosition = text.indexOf("(") + 1;
                const endPosition = text.lastIndexOf(")");
                const rawJsonString = text.substring(startPosition, endPosition);
                
                const json = JSON.parse(rawJsonString);
                if (json.table && json.table.rows) {
                    processRawRows(json.table.rows);
                } else {
                    displayErrorUI("Empty Grid Layout", "Ensure row records exist below your headers.");
                }
            } catch (error) {
                console.error("Critical Stream Error:", error);
                displayErrorUI("Access Rejected", "Verify Sheet settings are marked: Anyone with link can view.");
            }
        }

        function displayErrorUI(title, subtitle) {
            document.getElementById('loading-view').innerHTML = `
                <i class="fa-solid fa-circle-xmark" style="font-size:2rem; color:#ef4444; margin-bottom:1rem;"></i>
                <p style="color:#ef4444; font-weight:700;">${title}</p>
                <p style="font-size:0.8rem; margin-top:0.5rem; max-width:18rem;">${subtitle}</p>
            `;
        }

        function processRawRows(rows) {
            const parsedData = rows.map(row => {
                const cells = row.c || [];
                const finalPrice = cells[3] && cells[3].v ? parseInt(cells[3].v.toString().replace(/[^0-9]/g, '')) : 0;
                
                // 🔄 READ NEW COLUMN F (Base Price) - Fallback to Final Price if empty
                const basePrice = cells[5] && cells[5].v ? parseInt(cells[5].v.toString().replace(/[^0-9]/g, '')) : finalPrice;

                return {
                    category: cells[0] && cells[0].v ? cells[0].v.toString().trim() : "Uncategorized",
                    name: cells[1] && cells[1].v ? cells[1].v.toString().trim() : "Unnamed Item",
                    desc: cells[2] && cells[2].v ? cells[2].v.toString().trim() : "",
                    price: finalPrice,
                    basePrice: basePrice,
                    image: cells[4] && cells[4].v ? cells[4].v.toString().trim() : "https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=400"
                };
            });

            globalMenuData = parsedData.filter(item => 
                item.name.toLowerCase() !== "name" && 
                item.category.toLowerCase() !== "category"
            );

            const uniqueCategories = [...new Set(globalMenuData.map(item => item.category))];
            activeCategory = uniqueCategories[0] || "";

            renderCategoryBar(uniqueCategories);
            renderMenuGrid();
            updateFloatingStripUI();

            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('menu-items-grid').style.display = 'block';
        }

        function renderCategoryBar(categories) {
            const bar = document.getElementById('categories-bar');
            bar.innerHTML = "";

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-pill ${cat === activeCategory ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMenuGrid();
                };
                bar.appendChild(btn);
            });
        }

        function renderMenuGrid() {
            const grid = document.getElementById('menu-items-grid');
            grid.innerHTML = "";

            const filteredItems = globalMenuData.filter(item => item.category === activeCategory);

            filteredItems.forEach(item => {
                const currentQty = cartState[item.name] ? cartState[item.name].qty : 0;
                let actionButtonHtml = "";

                if (currentQty > 0) {
                    actionButtonHtml = `
                        <div class="stepper-container">
                            <button class="step-btn" onclick="modifyBasketQty('${item.name.replace(/'/g, "\\'")}', -1, ${item.price})">-</button>
                            <span class="step-qty">${currentQty}</span>
                            <button class="step-btn" onclick="modifyBasketQty('${item.name.replace(/'/g, "\\'")}', 1, ${item.price})">+</button>
                        </div>
                    `;
                } else {
                    actionButtonHtml = `
                        <button class="add-item-btn" onclick="modifyBasketQty('${item.name.replace(/'/g, "\\'")}', 1, ${item.price})">ADD +</button>
                    `;
                }

                // 🔥 AUTONOMOUS HAPPY HOUR INTERCEPTOR 
                const hasDiscount = item.basePrice > item.price;
                const priceDisplayHtml = hasDiscount 
                    ? `<span class="old-price">₹${item.basePrice}</span>₹${item.price}`
                    : `₹${item.price}`;
                
                const badgeHtml = hasDiscount
                    ? `<div class="happy-hour-badge"><i class="fa-solid fa-fire"></i> Happy Hour</div>`
                    : ``;

                const card = document.createElement('div');
                card.className = "menu-card";
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="prod-img" onerror="this.src='https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=400'">
                    <div class="prod-details">
                        <div>
                            <div class="prod-title">${item.name}</div>
                            ${badgeHtml}
                            <div class="prod-desc">${item.desc}</div>
                        </div>
                        <div class="prod-meta">
                            <div class="prod-price">${priceDisplayHtml}</div>
                            ${actionButtonHtml}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function modifyBasketQty(name, adjustment, price) {
            if (!cartState[name]) {
                cartState[name] = { price: price, qty: 0 };
            }
            
            cartState[name].qty += adjustment;
            
            if (cartState[name].qty <= 0) {
                delete cartState[name];
            }
            
            localStorage.setItem('digiconvo_cart', JSON.stringify(cartState));
            
            renderMenuGrid();
            updateFloatingStripUI();
        }

        function updateFloatingStripUI() {
            let total = 0, count = 0;
            for (let id in cartState) {
                total += cartState[id].price * cartState[id].qty;
                count += cartState[id].qty;
            }

            const strip = document.getElementById('floating-cart-bar');
            if (count > 0) {
                strip.style.display = 'flex';
                document.getElementById('strip-count').innerText = `${count} ${count > 1 ? 'Items' : 'Item'} Selected`;
                document.getElementById('strip-total').innerText = `Total: ₹${total}`;
            } else {
                strip.style.display = 'none';
            }
        }
    </script>
</body>
</html>
