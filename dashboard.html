<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive Terminal | The Velvet Lounge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #05070f; color: #f1f5f9; font-family: system-ui, sans-serif; padding: 1.5rem; }
        .dashboard-container { max-width: 50rem; margin: 0 auto; }
        
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card-kpi { background:#0b0f19; border:1px solid #1e2640; padding:15px; border-radius:10px; text-align:center; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e2640; padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .order-terminal-card { background-color: #0b0f19; border: 1px solid #1e2640; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1rem; }
        .badge-table { background-color: rgba(197, 168, 128, 0.15); border: 1px solid #c5a880; color: #c5a880; padding: 0.25rem 0.6rem; border-radius: 0.5rem; font-size: 0.85rem; }
        
        .btn-reset-panel { background-color: #ef4444; color: #ffffff; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; transition: background 0.2s; }
        .btn-reset-panel:hover { background-color: #dc2626; }
        
        .btn-print-action { background-color: #3b82f6; color: #ffffff; border: none; padding: 0.8rem 1.2rem; border-radius: 0.5rem; cursor: pointer; margin-top: 15px; font-weight: 700; width: 100%; }
        .btn-print-action:hover { background-color: #2563eb; }

        /* THERMAL GST INVOICE LAYOUT SPECIFICATION */
        .bill-invoice-container { background: #141b2d; border: 1px dashed #242f4d; padding: 12px; border-radius: 0.5rem; margin-top: 10px; font-family: 'Courier New', Courier, monospace; }
        .tax-computation-block { border-top: 1px dashed #242f4d; padding-top: 8px; margin-top: 8px; font-size: 0.82rem; color: #cbd5e1; }
        .tax-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .tax-row strong { color: #ffffff; }

        /* TARGETED SYSTEM PRINT INTERCEPTOR */
        @media print {
            body * { visibility: hidden; }
            .print-active, .print-active .bill-invoice-container, .print-active .bill-invoice-container * { visibility: visible; }
            .print-active { position: absolute; left: 0; top: 0; width: 100%; border: none; background: #ffffff !important; color: #000000 !important; padding: 0; }
            .print-active .bill-invoice-container { background: #ffffff !important; color: #000000 !important; border: none; width: 100%; max-width: 280px; }
            .print-active .tax-row, .print-active .tax-computation-block { color: #000000 !important; }
            .print-active .tax-row strong { color: #000000 !important; }
            .print-active pre { color: #000000 !important; }
            .screen-only-node { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container screen-only-node">
        <div class="analytics-grid">
            <div class="card-kpi"><p style="color:#64748b; font-size:0.7rem;">TOTAL REVENUE</p><h3 id="kpi-revenue" style="color:#38bdf8;">₹0</h3></div>
            <div class="card-kpi"><p style="color:#64748b; font-size:0.7rem;">PEAK HOUR</p><h3 id="kpi-peak" style="color:#10b981;">--</h3></div>
            <div class="card-kpi"><p style="color:#64748b; font-size:0.7rem;">AVG. TICKET</p><h3 id="kpi-avg" style="color:#c5a880;">₹0</h3></div>
        </div>
        <header>
            <h1>Digiconvo Executive POS</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <button class="btn-reset-panel" onclick="executeDatabasePurgeSequence()"><i class="fa-solid fa-trash-can"></i> Reset Logs</button>
                <div style="color: #10b981;"><i class="fa-solid fa-circle-dot"></i> Live Feed</div>
            </div>
        </header>
        <header style="border: none; margin-top: -1rem; margin-bottom: 1.5rem;">
            <p style="font-size: 0.85rem; color: #94a3b8;">*All menu rates are inclusive of 5% GST</p>
        </header>
        <main id="terminal-feed-wrapper"></main>
    </div>

    <script>
        // 🚀 NEW LIVE DEPLOYMENT ENDPOINT
        const CLOUD_API_ENDPOINT = "https://script.google.com/macros/s/AKfycbznHrEtLR_Twy4gw4ffuM-3Nk5G1P3GwxC00IQJ7xzanhitS3zYCe3VTfp_lzj2q1vj/exec";

        function fetchTerminalFeed() {
            fetch(CLOUD_API_ENDPOINT)
                .then(res => res.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        document.getElementById('terminal-feed-wrapper').innerHTML = `<p style="text-align:center; color:#64748b; margin-top:2rem;">No orders found in datalog.</p>`;
                        document.getElementById('kpi-revenue').innerText = "₹0";
                        document.getElementById('kpi-peak').innerText = "--";
                        document.getElementById('kpi-avg').innerText = "₹0";
                        return;
                    }

                    let totalRev = 0;
                    let hourCounts = {};
                    data.forEach(o => {
                        totalRev += parseFloat(o.total) || 0;
                        let hr = new Date("1970-01-01 " + o.timestamp).getHours();
                        hourCounts[hr] = (hourCounts[hr] || 0) + 1;
                    });
                    
                    let peakHour = Object.keys(hourCounts).length > 0 ? Object.keys(hourCounts).reduce((a, b) => hourCounts[a] > hourCounts[b] ? a : b) : "--";
                    document.getElementById('kpi-revenue').innerText = "₹" + totalRev.toLocaleString();
                    document.getElementById('kpi-peak').innerText = peakHour !== "--" ? peakHour + ":00" : "--";
                    document.getElementById('kpi-avg').innerText = "₹" + (totalRev / data.length).toFixed(0);

                    const feed = document.getElementById('terminal-feed-wrapper');
                    feed.innerHTML = "";
                    data.reverse().forEach(order => {
                        const cardId = "card-" + order.id;
                        
                        // Reverse computing 5% GST structure (Rates inclusive of Tax)
                        let grossTotal = parseFloat(order.total) || 0;
                        let taxableValue = grossTotal / 1.05;
                        let aggregateGst = grossTotal - taxableValue;
                        let cgst = aggregateGst / 2;
                        let sgst = aggregateGst / 2;

                        feed.innerHTML += `
                            <div class="order-terminal-card" id="${cardId}">
                                <div class="screen-only-node" style="display:flex; justify-content:space-between; margin-bottom:12px;">
                                    <span class="badge-table">Table ${order.table}</span>
                                    <span style="font-weight:600; color:#94a3b8; font-size:0.85rem;">Mode: ${order.mode}</span>
                                    <span style="font-weight:800; color:#10b981;">₹${grossTotal.toFixed(2)}</span>
                                </div>
                                
                                <!-- PRINT ENGINE READY TARGET NODE -->
                                <div class="bill-invoice-container">
                                    <div style="text-align:center; font-weight:800; font-size:0.95rem; margin-bottom:4px;">THE VELVET LOUNGE</div>
                                    <div style="text-align:center; font-size:0.72rem; margin-bottom:8px;">GSTIN: 23AAAAA1111A1Z1</div>
                                    <div style="font-size:0.75rem; margin-bottom:6px; border-bottom:1px dashed #242f4d; padding-bottom:6px;">
                                        ID: ${order.id} | Time: ${order.timestamp}<br>
                                        Guest: ${order.guest.toUpperCase()} | Tbl: ${order.table}
                                    </div>
                                    <pre style="font-size: 0.75rem; font-family:monospace; white-space:pre-wrap;">${order.rawKot}</pre>
                                    
                                    <div class="tax-computation-block">
                                        <div class="tax-row"><span>Taxable Subtotal:</span><span>₹${taxableValue.toFixed(2)}</span></div>
                                        <div class="tax-row"><span>CGST @ 2.5%:</span><span>₹${cgst.toFixed(2)}</span></div>
                                        <div class="tax-row"><span>SGST @ 2.5%:</span><span>₹${sgst.toFixed(2)}</span></div>
                                        <div class="tax-row" style="border-top:1px dashed #242f4d; padding-top:4px; margin-top:4px;">
                                            <strong>NET TOTAL (Incl. Tax):</strong><strong>₹${grossTotal.toFixed(2)}</strong>
                                        </div>
                                    </div>
                                    <div class="print-active" style="display:none; text-align:center; font-size:0.7rem; margin-top:10px;">Thank You! Visit Again.</div>
                                </div>
                                <button class="btn-print-action screen-only-node" onclick="printCard('${cardId}')"><i class="fa-solid fa-print"></i> Print GST Invoice</button>
                            </div>`;
                    });
                });
        }

        function printCard(id) {
            const card = document.getElementById(id);
            card.classList.add('print-active');
            window.print();
            card.classList.remove('print-active');
        }

        function executeDatabasePurgeSequence() {
            const verification = confirm("⚠️ ALERT: Are you absolutely sure you want to completely erase the transaction history and reset the cloud database log? This action is irreversible.");
            if (verification) {
                fetch(CLOUD_API_ENDPOINT + "?action=reset", { method: "POST" })
                    .then(res => res.json())
                    .then(resObject => {
                        if (resObject.status === "SUCCESS") {
                            alert("Database log successfully cleared.");
                            fetchTerminalFeed();
                        } else {
                            alert("Error processing purge command: " + resObject.message);
                        }
                    }).catch(err => alert("Connection system crash error: " + err));
            }
        }

        window.onload = () => { fetchTerminalFeed(); setInterval(fetchTerminalFeed, 7000); };
    </script>
</body>
</html>
