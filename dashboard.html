<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Terminal | Digiconvo KDS</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* LUXURY DARK & GOLD CORE DESIGN SYSTEM */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #05070f;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        
        /* 🔐 ATM-STYLE PIN LOCK OVERLAY (TOUCH-FIXED) */
        #pin-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #05070f; /* Fallback color to avoid rendering glitches */
            background-color: rgba(5, 7, 15, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto; /* Forces browser to intercept touches */
        }
        .pin-container {
            background-color: #0b0f19;
            border: 1px solid #1e2640;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 22rem;
            width: 90%;
            pointer-events: auto;
        }
        .pin-display {
            background-color: #05070f;
            border: 1px solid #242f4d;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1.75rem;
            letter-spacing: 0.5rem;
            font-weight: 800;
            color: #c5a880;
            margin-bottom: 1.5rem;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        .pin-btn {
            background-color: #141b2d;
            border: 1px solid #1e2640;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1rem 0;
            border-radius: 0.75rem; /* Better mobile tap targeting than 50% circle */
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .pin-btn:active { background-color: #c5a880; color: #070a13; transform: scale(0.95); }
        .pin-btn.clear { color: #ef4444; font-size: 1.1rem; }
        .pin-btn.submit { color: #10b981; font-size: 1.1rem; }

        /* 💻 DASHBOARD WORKSPACE LAYOUT */
        .dashboard-layout { display: none; padding: 2rem; max-width: 90rem; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e2640;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand-meta h1 { font-size: 1.75rem; color: #ffffff; font-weight: 800; }
        .brand-meta p { color: #c5a880; font-size: 0.9rem; font-weight: 600; margin-top: 0.25rem; }
        
        .btn-reset-session {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 0.6rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .btn-reset-session:hover { background-color: #ef4444; color: #05070f; }

        /* ANALYTICS GRID */
        .analytics-strip { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-card {
            background-color: #0b0f19;
            border: 1px solid #1e2640;
            padding: 1.25rem 2rem;
            border-radius: 1rem;
            flex: 1;
            min-width: 14rem;
        }
        .stat-card p { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
        .stat-card h3 { font-size: 1.75rem; color: #ffffff; font-weight: 800; margin-top: 0.25rem; }

        /* 📑 TAB CONTROL SYSTEM */
        .view-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #1e2640;
            padding-bottom: 0.75rem;
        }
        .tab-trigger {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1rem;
            font-weight: 700;
            padding: 0.5rem 1rem;
            cursor: pointer;
            position: relative;
        }
        .tab-trigger.active { color: #c5a880; }
        .tab-trigger.active::after {
            content: '';
            position: absolute;
            bottom: -0.85rem; left: 0; width: 100%; height: 2px;
            background-color: #c5a880;
        }

        /* KDS ORDERS GRID */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
            gap: 1.5rem;
        }
        .order-card {
            background-color: #141b2d;
            border: 1px solid #1e2640;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .order-card.fulfilled-style { border-color: rgba(16, 185, 129, 0.2); opacity: 0.75; }
        
        .card-header {
            background-color: #1e2640;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #242f4d;
        }
        .table-badge { background-color: #c5a880; color: #05070f; font-weight: 800; padding: 0.25rem 0.6rem; border-radius: 0.4rem; font-size: 0.85rem; }
        .table-badge.fulfilled-badge { background-color: #10b981; }
        .order-id { font-weight: 700; font-size: 0.9rem; color: #cbd5e1; }
        
        .card-body { padding: 1.25rem; flex: 1; }
        .cust-name { font-size: 1.1rem; font-weight: 700; color: #ffffff; margin-bottom: 0.75rem; }
        .items-list { font-family: monospace; font-size: 0.95rem; color: #94a3b8; line-height: 1.5; white-space: pre-line; }
        .order-total { margin-top: 1rem; font-weight: 800; color: #c5a880; font-size: 1.1rem; border-top: 1px dashed #242f4d; padding-top: 0.75rem; }

        .card-actions { padding: 1rem; display: flex; gap: 0.75rem; background-color: #0b0f19; }
        .btn {
            flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s;
        }
        .btn-print { background-color: #242f4d; color: #cbd5e1; border: 1px solid #3b4b75; }
        .btn-print:hover { background-color: #3b4b75; color: #ffffff; }
        .btn-fulfill { background-color: #10b981; color: #05070f; }
        .btn-fulfill:hover { background-color: #059669; }
        .status-tag { font-size: 0.85rem; font-weight: 700; color: #10b981; width: 100%; text-align: center; padding: 0.4rem; }

        /* LOADING & EMPTY STATES */
        .loading-view { text-align: center; padding: 5rem; color: #64748b; font-weight: 600; grid-column: 1/-1; }
        
        /* 🖨️ KOT PRINT CONFIGURATION */
        @media print {
            body * { display: none; }
            #kot-print-area { display: block !important; position: absolute; top: 0; left: 0; width: 58mm; font-family: 'Courier New', Courier, monospace; color: #000000; background: #ffffff; padding: 0; margin: 0; }
            .kot-pre { font-size: 12px; font-weight: bold; line-height: 1.2; white-space: pre-wrap; word-break: break-all; width: 58mm; }
        }
    </style>
</head>
<body>

    <!-- 🔐 PIN PAD OVERLAY GATEKEEPER -->
    <div id="pin-overlay">
        <div class="pin-container">
            <h2 style="color: #ffffff; margin-bottom: 0.5rem; font-weight: 800;">Admin Terminal</h2>
            <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem;">Enter 4-Digit Secure PIN (Or Type via Keyboard)</p>
            <div class="pin-display" id="pin-dots"></div>
            <div class="pin-grid">
                <button class="pin-btn" onclick="pressPin('1')">1</button>
                <button class="pin-btn" onclick="pressPin('2')">2</button>
                <button class="pin-btn" onclick="pressPin('3')">3</button>
                <button class="pin-btn" onclick="pressPin('4')">4</button>
                <button class="pin-btn" onclick="pressPin('5')">5</button>
                <button class="pin-btn" onclick="pressPin('6')">6</button>
                <button class="pin-btn" onclick="pressPin('7')">7</button>
                <button class="pin-btn" onclick="pressPin('8')">8</button>
                <button class="pin-btn" onclick="pressPin('9')">9</button>
                <button class="pin-btn clear" onclick="clearPin()"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="pin-btn" onclick="pressPin('0')">0</button>
                <button class="pin-btn submit" onclick="submitPin()"><i class="fa-solid fa-unlock"></i></button>
            </div>
        </div>
    </div>

    <!-- 💻 MAIN LIVE KDS WORKSPACE -->
    <div class="dashboard-layout" id="main-workspace">
        <header>
            <div class="brand-meta">
                <h1>The Velvet Lounge</h1>
                <p><i class="fa-solid fa-circle" style="color:#10b981; font-size:0.7rem;"></i> Terminal Display System (7s Sync)</p>
            </div>
            <button class="btn-reset-session" onclick="triggerClosingReset()">
                <i class="fa-solid fa-dumpster-fire"></i> Closing Reset (Clear Day)
            </button>
        </header>

        <!-- ANALYTICS HIGHLIGHTS LOGS -->
        <div class="analytics-strip">
            <div class="stat-card">
                <p>Live Active KOTs</p>
                <h3 id="stat-active-count">0 Pending</h3>
            </div>
            <div class="stat-card">
                <p>Today's Total Orders</p>
                <h3 id="stat-total-count">0 Orders</h3>
            </div>
            <div class="stat-card">
                <p>Gross Volume Today</p>
                <h3 id="stat-gross-revenue">₹0.00</h3>
            </div>
        </div>

        <!-- 📑 SUB-TABS CONTROL SYSTEM -->
        <div class="view-tabs">
            <button class="tab-trigger active" id="tab-active" onclick="switchViewTab('active')">Active KOTs</button>
            <button class="tab-trigger" id="tab-history" onclick="switchViewTab('history')">Order History (Past Log)</button>
        </div>

        <!-- LIVE ORDERS LIVE CONTAINER -->
        <main class="orders-grid" id="orders-live-grid">
            <div class="loading-view">Syncing active rows from cloud grid...</div>
        </main>
    </div>

    <!-- 🖨️ HIDDEN 58mm KOT TERMINAL RENDERER -->
    <div id="kot-print-area" style="display: none;"></div>

    <script>
        const SPREADSHEET_ID = "11GI3zgBG6Zgjy45v2SIeu6QF7c8xIyNoQvtI92P58ME";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQRFRcgFrTnbEZ5nDaIj0a-K221Kd5nf9qKBr9o5UMGTawayj_fgIOBttw3okYMMo/exec";
        const MASTER_PIN = "2580";

        let currentPinInput = "";
        let securityAttempts = 0;
        let globalOrdersCache = [];
        let currentViewMode = "active"; 

        // ⌨️ ACCESSIBILITY: PHYSICAL KEYBOARD LISTENER
        window.addEventListener('keydown', function(e) {
            // Only listen if PIN screen is active
            if (document.getElementById('pin-overlay').style.display !== 'none') {
                if (e.key >= '0' && e.key <= '9') {
                    pressPin(e.key);
                } else if (e.key === 'Backspace') {
                    clearPin();
                } else if (e.key === 'Enter') {
                    submitPin();
                }
            }
        });

        // PIN-PAD INTERFACE SYSTEM
        function pressPin(num) {
            if (currentPinInput.length < 4) {
                currentPinInput += num;
                updatePinDisplay();
            }
        }
        function clearPin() {
            currentPinInput = "";
            updatePinDisplay();
        }
        function updatePinDisplay() {
            document.getElementById('pin-dots').innerText = "• ".repeat(currentPinInput.length);
        }
        function submitPin() {
            if (currentPinInput === MASTER_PIN) {
                document.getElementById('pin-overlay').style.display = 'none';
                document.getElementById('main-workspace').style.display = 'block';
                startLiveKdsEngine();
            } else {
                securityAttempts++;
                alert(`Access Denied. Invalid PIN Code. (${securityAttempts}/3)`);
                clearPin();
                if (securityAttempts >= 3) window.location.href = "index.html";
            }
        }

        function startLiveKdsEngine() {
            fetchLiveOrdersFromCloud();
            setInterval(fetchLiveOrdersFromCloud, 7000); 
        }

        async function fetchLiveOrdersFromCloud() {
            const endpoint = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?sheet=Orders+Log&tqx=out:json`;
            try {
                const response = await fetch(endpoint);
                const text = await response.text();
                
                const startPosition = text.indexOf("(") + 1;
                const endPosition = text.lastIndexOf(")");
                const json = JSON.parse(text.substring(startPosition, endPosition));
                
                if (json.table && json.table.rows) {
                    processOrdersLogRows(json.table.rows);
                }
            } catch (error) {
                console.error("KDS Data Sync Interrupted:", error);
            }
        }

        function processOrdersLogRows(rows) {
            if (rows.length === 0) return;

            const headers = rows[0].c.map(cell => cell && cell.v ? cell.v.toString().trim().toLowerCase() : "");
            
            let idIdx = headers.findIndex(h => h.includes("id"));
            let nameIdx = headers.findIndex(h => h.includes("name") || h.includes("customer"));
            let tableIdx = headers.findIndex(h => h.includes("table"));
            let itemsIdx = headers.findIndex(h => h.includes("item"));
            let totalIdx = headers.findIndex(h => h.includes("total") || h.includes("price") || h.includes("amount"));
            let statusIdx = headers.indexOf("status");

            if (idIdx === -1) idIdx = 0;
            if (nameIdx === -1) nameIdx = 1;
            if (tableIdx === -1) tableIdx = 2;
            if (itemsIdx === -1) itemsIdx = 3;
            if (totalIdx === -1) totalIdx = 4;
            if (statusIdx === -1) statusIdx = headers.length > 5 ? 5 : -1;

            let allOrders = [];
            let activeCount = 0;
            let totalLoggedCount = 0;
            let totalGrossRevenue = 0;

            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i].c || [];
                if (!cells[idIdx] || cells[idIdx].v === null) continue;

                const order = {
                    id: cells[idIdx] ? cells[idIdx].v.toString() : "",
                    name: cells[nameIdx] && cells[nameIdx].v ? cells[nameIdx].v.toString() : "Walk-In Guest",
                    table: cells[tableIdx] && cells[tableIdx].v ? cells[tableIdx].v.toString() : "00",
                    items: cells[itemsIdx] && cells[itemsIdx].v ? cells[itemsIdx].v.toString() : "",
                    total: cells[totalIdx] && cells[totalIdx].v ? parseFloat(cells[totalIdx].v.toString().replace(/[^0-9.]/g, '')) : 0,
                    status: (statusIdx !== -1 && cells[statusIdx] && cells[statusIdx].v) ? cells[statusIdx].v.toString().trim() : "Pending"
                };

                totalLoggedCount++;
                totalGrossRevenue += order.total;
                if (order.status.toLowerCase() !== "fulfilled") {
                    activeCount++;
                }

                allOrders.push(order);
            }

            globalOrdersCache = allOrders;
            
            document.getElementById('stat-active-count').innerText = `${activeCount} Pending`;
            document.getElementById('stat-total-count').innerText = `${totalLoggedCount} Orders`;
            document.getElementById('stat-gross-revenue').innerText = `₹${totalGrossRevenue.toFixed(2)}`;

            renderKdsGrid();
        }

        function switchViewTab(mode) {
            currentViewMode = mode;
            document.getElementById('tab-active').classList.toggle('active', mode === 'active');
            document.getElementById('tab-history').classList.toggle('active', mode === 'history');
            renderKdsGrid();
        }

        function renderKdsGrid() {
            const grid = document.getElementById('orders-live-grid');
            grid.innerHTML = "";

            const filteredOrders = globalOrdersCache.filter(order => {
                if (currentViewMode === "active") {
                    return order.status.toLowerCase() !== "fulfilled";
                } else {
                    return order.status.toLowerCase() === "fulfilled";
                }
            });

            if (filteredOrders.length === 0) {
                grid.innerHTML = currentViewMode === "active" 
                    ? `<div class="loading-view" style="color: #10b981;"><i class="fa-solid fa-circle-check" style="font-size:2rem; margin-bottom:1rem; display:block;"></i>All Kitchen Orders Fulfilled!</div>`
                    : `<div class="loading-view">No past fulfilled logs found for today.</div>`;
                return;
            }

            filteredOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = `order-card ${order.status.toLowerCase() === "fulfilled" ? 'fulfilled-style' : ''}`;
                card.id = `order-card-${order.id}`;
                
                let actionHtml = "";
                if (order.status.toLowerCase() !== "fulfilled") {
                    actionHtml = `
                        <div class="card-actions">
                            <button class="btn btn-print" onclick="executeKotThermalPrint('${order.id}')"><i class="fa-solid fa-print"></i> KOT</button>
                            <button class="btn btn-fulfill" onclick="triggerMarkFulfilledAction('${order.id}')"><i class="fa-solid fa-check"></i> Fulfill</button>
                        </div>
                    `;
                } else {
                    actionHtml = `
                        <div class="card-actions">
                            <div class="status-tag"><i class="fa-solid fa-circle-check"></i> Fulfilled & Dispatched</div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="order-id">#${order.id}</span>
                        <span class="table-badge ${order.status.toLowerCase() === "fulfilled" ? 'fulfilled-badge' : ''}">Table ${order.table}</span>
                    </div>
                    <div class="card-body">
                        <div class="cust-name">${order.name}</div>
                        <div class="items-list">${order.items}</div>
                        <div class="order-total">Total Amount: ₹${order.total.toFixed(2)}</div>
                    </div>
                    ${actionHtml}
                `;
                grid.appendChild(card);
            });
        }

        async function triggerMarkFulfilledAction(orderId) {
            const card = document.getElementById(`order-card-${orderId}`);
            if (card) {
                card.style.opacity = '0.3';
                card.style.transform = 'scale(0.95)';
                card.style.pointerEvents = 'none';
            }

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "updateStatus",
                        orderId: orderId,
                        status: "Fulfilled"
                    })
                });

                const match = globalOrdersCache.find(o => o.id === orderId);
                if (match) match.status = "Fulfilled";
                renderKdsGrid();

            } catch (error) {
                alert("Cloud Synchronization Failed.");
                if (card) { card.style.opacity = '1'; card.style.transform = 'none'; card.style.pointerEvents = 'auto'; }
            }
        }

        async function triggerClosingReset() {
            const activeOrders = globalOrdersCache.filter(o => o.status.toLowerCase() !== "fulfilled");
            if (activeOrders.length === 0) {
                alert("All orders are already cleared! No active KOTs to reset.");
                return;
            }

            const confirmCode = prompt(`⚠️ WARNING: This will clear/fulfill all active ${activeOrders.length} orders.\nType 'RESET' to confirm closing:`);
            if (confirmCode !== "RESET") {
                alert("Reset cancelled.");
                return;
            }

            document.getElementById('orders-live-grid').innerHTML = `<div class="loading-view">Executing Bulk Closing Operations...</div>`;

            for (let order of activeOrders) {
                try {
                    await fetch(APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "updateStatus",
                            orderId: order.id,
                            status: "Fulfilled"
                        })
                    });
                    order.status = "Fulfilled";
                } catch (e) {
                    console.error("Failed to clear order:", order.id);
                }
            }

            alert("Session Closed Successfully!");
            fetchLiveOrdersFromCloud(); 
        }

        function executeKotThermalPrint(orderId) {
            const order = globalOrdersCache.find(o => o.id === orderId);
            if (!order) return;

            const printArea = document.getElementById('kot-print-area');
            
            let kotText = `==========================\n`;
            kotText += `      KITCHEN ORDER       \n`;
            kotText += `==========================\n`;
            kotText += `Order ID : #${order.id.padEnd(13)}\n`;
            kotText += `Table No : T-${order.table.padEnd(12)}\n`;
            kotText += `Cust Name: ${order.name.substring(0, 14).padEnd(14)}\n`;
            kotText += `--------------------------\n`;
            kotText += `ITEMS LOGS:\n`;

            const itemsLines = order.items.split('\n');
            itemsLines.forEach(line => {
                if(line.trim() !== "") {
                    kotText += `• ${line.substring(0, 24)}\n`;
                }
            });
            
            kotText += `==========================\n`;
            kotText += `   DIGICONVO KDS SYSTEM   \n`;
            kotText += `==========================\n\n\n\n`;

            printArea.innerHTML = `<pre class="kot-pre">${kotText}</pre>`;
            window.print();
        }
    </script>
</body>
</html>
